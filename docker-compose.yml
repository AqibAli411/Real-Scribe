version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: realscribe
      POSTGRES_USER: realscribe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    command: ["postgres", "-c", "log_statement=none", "-c", "ssl=off"]
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realscribe -d realscribe"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/realscribe
      SPRING_DATASOURCE_USERNAME: realscribe
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      JAVA_TOOL_OPTIONS: -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

volumes:
  postgres_data:
