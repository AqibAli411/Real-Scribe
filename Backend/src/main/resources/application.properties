# Optional: copy application-local.properties.example -> application-local.properties (gitignored) with your real DB password
spring.config.import=optional:classpath:application-local.properties

# ================= DATABASE CONFIGURATION =================
spring.datasource.driver-class-name=org.postgresql.Driver

# URL default: local DB named realscribe. User/password must match your Postgres install (see application-local.properties.example)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/realscribe}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:aqib-ali}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ================= JPA CONFIGURATION =================
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================= HIKARI CONNECTION POOL =================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ================= DISABLE JDBC =================
spring.data.jdbc.repositories.enabled=false

# ================= SAFE ERROR / LOGGING DEFAULTS =================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
logging.level.root=${LOG_LEVEL_ROOT:INFO}
